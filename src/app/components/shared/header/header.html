<header class="desktop-header">

  <!-- Left — logo or back button -->
  <div class="header-left">
    @if (showBack) {
      <button class="btn-back" (click)="goBack()">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        @if (title) {
          <span>{{ title }}</span>
        }
      </button>
    }
  </div>

  <a class="header-logo" routerLink="/">
    <img src="assets/potikadalogo.png" alt="Potikada" />
    </a>

  <!-- Right — actions -->
  <div class="desktop-header-actions">

    @if (showCart) {
      <button class="icon-btn" (click)="goCart()">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        @if (cartService.cartCount() > 0) {
          <span class="desktop-cart-count">{{ cartService.cartCount() }}</span>
        }
      </button>
    }

    @if (showWishlist) {
      <button class="icon-btn" (click)="goWishlist()">
        <svg viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        @if (cartService.wishlistCount() > 0) {
          <span class="desktop-cart-count liked-badge">{{ cartService.wishlistCount() }}</span>
        }
      </button>
    }

    @if (showMenu) {
      <button class="icon-btn" (click)="menuClicked.emit()">
        <svg viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    }

  </div>
</header>
