<div class="admin-login-page">

  <div class="login-left">
    <div class="login-brand">
      <div class="brand-logo">potikada</div>
      <div class="brand-tag">Admin Panel</div>
    </div>
    <div class="login-illustration">
      <div class="ill-circle c1"></div>
      <div class="ill-circle c2"></div>
      <div class="ill-circle c3"></div>
      <div class="ill-text">
        <h2>Manage Your Store</h2>
        <p>Products · Orders · Affiliates</p>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">

      <div class="login-header">
        <h1>Welcome back 👋</h1>
        <p>Sign in to your admin panel</p>
      </div>

      @if (error) {
        <div class="error-banner">
          ⚠️ {{ error }}
        </div>
      }

      <div class="form-field">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="admin@potikada.com"
          (keyup.enter)="login()">
      </div>

      <div class="form-field">
        <label>Password</label>
        <div class="password-wrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter password"
            (keyup.enter)="login()">
          <button class="toggle-pw" (click)="showPassword = !showPassword">
            @if (showPassword) {
              <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <button class="btn-login" (click)="login()" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Signing in...
        } @else {
          Sign In →
        }
      </button>

      <div class="login-footer">
        <a routerLink="/">← Back to Store</a>
      </div>

    </div>
  </div>

</div>
