<div class="admin-shell" [class.sidebar-closed]="!sidebarOpen">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <a class="header-logo" routerLink="/">
        <img src="assets/potikadalogo.png" alt="Potikada" />
      </a>
      <span class="brand-sub">admin</span>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">

      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>

      <a class="nav-item" routerLink="/admin/products" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Products</span>
      </a>

      <a class="nav-item" routerLink="/admin/orders" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Orders</span>
      </a>

      <a class="nav-item" routerLink="/admin/affiliates" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Affiliates</span>
      </a>

      <a class="nav-item" routerLink="/admin/categories" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Categories</span>
      </a>

      <a class="nav-item" routerLink="/admin/banners" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
        <span>Banners</span>
      </a>

      <!-- NEW: Variant Families -->
      <a class="nav-item" routerLink="/admin/variant-families" routerLinkActive="active">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="6" r="3"/><circle cx="15" cy="18" r="3"/><path d="M9 9v7a3 3 0 0 0 3 3"/><path d="M15 15V9a3 3 0 0 0-3-3"/></svg>
        <span>Variants</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" routerLink="/" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <span>View Store</span>
      </a>

    </nav>

    <!-- Admin user -->
    <div class="sidebar-footer">
      <div class="admin-avatar">
        {{ adminUser?.name?.charAt(0) || 'A' }}
      </div>
      <div class="admin-info">
        <div class="admin-name">{{ adminUser?.name || 'Admin' }}</div>
        <div class="admin-role">Administrator</div>
      </div>
      <button class="logout-btn" (click)="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

  </aside>

  <!-- Main content -->
  <div class="admin-main">

    <!-- Top bar -->
    <header class="admin-topbar">
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-right">
        <div class="topbar-store">
          <div class="store-dot"></div>
          Store Online
        </div>
      </div>
    </header>

    <!-- Page content -->
    <div class="admin-content">
      <router-outlet />
    </div>

  </div>

</div>
